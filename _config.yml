      - title: "Legal Insight - AI Chatbot for Pakistani Legal System"
        sub_title: "Final Year Project | MERN, FastAPI, LangGraph, Neo4j, Docker, Kubernetes, Terraform, AWS"
        caption: "Sep 2025 - May 2026"
        description: |
          * Developed a comprehensive legal assistant that evaluates user facts against a multi-domain Neo4j Knowledge Graph to provide end-to-end statutory analysis, procedural guidance, data-driven outcome prediction, and document drafting.
          * Implemented an Agentic Workflow using LangGraph and Gemini LLM for query decomposition and intelligent intent routing between casual conversation, specific legal queries, and document drafting.
          * Created a Legal Drafting System that automates the creation of court documents; users can request specific forms (e.g., "Draft an FIR"), and the system retrieves and fills templates programmatically.
          * Integrated Jina AI embeddings for high-precision semantic search, utilizing a Graph RAG architecture to traverse Neo4j relationships and ground Gemini's answer generation in specific hierarchical sections of the Pakistan Penal Code.
          * Designed a Multi-Service Container Architecture using Docker (multi-stage builds) for Frontend (React), Backend (Node.js), and RAG (Python) microservices to optimize image size and deployment speeds.
          * Orchestrated production deployment on AWS EC2 using Kubernetes (K8s), utilizing StatefulSets for persistent MongoDB storage and Nginx Ingress Controllers for path-based traffic routing.
          * Built a full CI/CD Pipeline via GitHub Actions with integrated DevSecOps gates (Trivy, Semgrep) to automate builds, vulnerability scanning, and rolling updates with zero downtime.
          * Managed Infrastructure as Code (IaC) via Terraform, provisioning Security Groups and Elastic IP (EIP) configurations to ensure network stability and restricted instance access.

      - title: "Secure Cloud Infrastructure & Network Architecture"
        sub_title: "Microsoft Azure, Azure CLI, Shell Scripting, Linux"
        caption: "Jan 2026 - May 2026"
        description: |
          An enterprise-grade cloud networking environment focused on data protection and robust network isolation. It establishes secure connectivity protocols and strict access controls to separate public-facing services from sensitive data.
          
          * Architected and deployed a secure Hub-Spoke network topology on Microsoft Azure, establishing Site-to-Site VPN tunnels and configuring Virtual Network Gateways.
          * Implemented strict network segmentation and access controls using Network Security Groups (NSGs) and Service Endpoints.

      - title: "Automated Crypto Trading Bot"
        sub_title: "Python, Bybit API, Groq LLM"
        caption: "Dec 2025 - Jan 2026"
        description: |
          An intelligent algorithmic trading system that integrates Large Language Models (LLMs) with financial exchange APIs to monitor, parse, and execute complex trades in real-time.
          
          * Built a live data pipeline using Telethon to capture unstructured trading signals from Telegram channels.
          * Integrated Groq's LLM API (Llama-3) with strict system prompts to parse natural language messages, safely extracting structured JSON parameters for entries, Stop Losses (SL), and Take Profits (TP).
          * Engineered robust execution logic via the Bybit API, implementing hybrid trade strategies that handle main entries, automated hard SLs, and conditional limit orders for partial take-profits.
          * Deployed as a 24/7 background service on Render, utilizing Flask-based keep-alive mechanisms and automated trade logging to Google Sheets.

      - title: "Distributed Consensus System - Raft Implementation"
        sub_title: "Go, RPC"
        caption: "Sep 2024 - Dec 2024"
        description: |
          A fault-tolerant distributed key-value store built from scratch to ensure high availability, data consistency, and resilience across multiple network nodes.
          
          * Designed and developed the backend architecture entirely in Go (Golang) using RPC for inter-node communication.
          * Implemented the Raft consensus algorithm from the ground up without relying on external consensus libraries.
          * Engineered robust, concurrent mechanisms for leader election, log replication, and conflict resolution to handle simulated node failures.

