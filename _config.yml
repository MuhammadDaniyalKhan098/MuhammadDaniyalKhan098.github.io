# Resume Content
content:
  - title: Education
    layout: list
    content:
      - title: Lahore University of Management Sciences (LUMS)
        sub_title: BS Computer Science
        caption: Sep 2022 - May 2026
        quote: CGPA: 3.4
        description: |
          **Core Coursework:** Distributed Systems, Cloud Computing, Software Engineering, Network-Centric Computing, Operating Systems, Network Security, Databases, Data Structures, Algorithms, and Advanced Programming.

  - title: Professional Experience
    layout: list
    content:
      - title: Lahore University of Management Sciences (LUMS)
        sub_title: Teaching Assistant - Fundamentals of Computer Systems
        caption: Sep 2024 - Dec 2024
        description: |
          * Supported 150+ students in understanding low-level systems concepts, including memory hierarchy and Assembly/C.
          * Conducted quizzes, graded programming assignments, and held weekly office hours.

  - title: Projects
    layout: list
    content:
      - title: Legal Insight AI Chatbot
        sub_title: Final Year Project | MERN, FastAPI, LangGraph, Neo4j, Gemini API
        caption: Sep 2025 - Present
        description: |
          * Developed a comprehensive legal assistant delivering statutory analysis, procedural guidance, and document drafting via a multi-domain Neo4j Knowledge Graph.
          * Implemented an Agentic Workflow using LangGraph and Gemini LLM API for intelligent intent routing and query decomposition.
          * Created a Legal Drafting System that automates court document creation using programmatic template filling.
          * Integrated Jina AI embeddings for Graph RAG architecture to ground answer generation in the Pakistan Penal Code.

      - title: Secure Cloud Infrastructure & Network Architecture
        sub_title: Microsoft Azure, Azure CLI, Shell Scripting
        caption: Jan 2026 - Mar 2026
        description: |
          * Architected and deployed a secure Hub-Spoke network topology with Site-to-Site VPN tunnels and Virtual Network Gateways.
          * Implemented strict network segmentation using Network Security Groups (NSGs) and Service Endpoints to isolate public services from private data.

      - title: Distributed Consensus System (Raft Implementation)
        sub_title: Go, RPC
        caption: Sep 2024 - Dec 2024
        description: |
          * Designed a distributed key-value store in Go implementing the Raft consensus algorithm from scratch.
          * Built leader election, log replication, and conflict resolution mechanisms for fault tolerance.

      - title: Automated Crypto Trading Bot
        sub_title: Python, Bybit API, Groq LLM, Render
        caption: Dec 2024 - Jan 2025
        description: |
          * Developed an automated bot that parses JSON signals and executes trades via the Bybit API.
          * Integrated Groq's LLM API to extract structured trade parameters from unstructured Telegram messages.
          * Deployed on Render with keep-alive mechanisms for 24/7 signal monitoring.

  - title: Technical Skills
    layout: text
    content: |
      **Languages:** Python, C++, JavaScript/TypeScript, SQL, Go (Golang), Haskell, HTML/CSS.
      
      **Backend & Cloud:** FastAPI, Node.js, Docker, Render, REST APIs, WebSockets.
      
      **Databases:** MongoDB (NoSQL), Neo4j (Graph DB).
      
      **System Concepts:** Distributed Consensus (Raft), Microservices Architecture, Multithreading, MLOps.

